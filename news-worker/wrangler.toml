name = "overlapse-news"
main = "src/index.ts"
compatibility_date = "2024-06-01"

# Free tier: 100,000 requests/day, 10ms CPU per request
# KV free tier: 100,000 reads/day, 1,000 writes/day, 1 GB storage

# KV namespace for caching — create with: wrangler kv:namespace create NEWS_CACHE
# Then paste the id below.
[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "REPLACE_WITH_YOUR_KV_ID"

# Optional: NewsAPI.org key for fallback (dev only)
[vars]
NEWS_API_KEY = ""

# Run locally: wrangler dev
# Deploy: wrangler deploy
# After deploy, set the worker URL in your Overlapse .env.local:
#   NEXT_PUBLIC_NEWS_WORKER_URL=https://overlapse-news.<your-subdomain>.workers.dev
